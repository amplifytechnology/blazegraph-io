name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Build CLI binary
        run: cargo build --release -p blazegraph-cli

      - name: Package archive (Linux/macOS)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir staging
          cp target/release/blazegraph-cli staging/
          cp blazegraph-core/deps/tika/jni-jars/blazing-tika-jni.jar staging/
          cd staging
          tar -czf ../blazegraph-cli-${{ matrix.target }}.tar.gz blazegraph-cli blazing-tika-jni.jar

      - name: Package archive (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path staging
          Copy-Item target/release/blazegraph-cli.exe staging/
          Copy-Item blazegraph-core/deps/tika/jni-jars/blazing-tika-jni.jar staging/
          Compress-Archive -Path staging/blazegraph-cli.exe, staging/blazing-tika-jni.jar -DestinationPath blazegraph-cli-${{ matrix.target }}.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: blazegraph-cli-${{ matrix.target }}
          path: blazegraph-cli-${{ matrix.target }}.${{ matrix.archive }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
